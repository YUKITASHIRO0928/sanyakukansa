// ═══════════════════════════════════════════
// GS-1 バーコードパーサー
// ═══════════════════════════════════════════
// AI(01) = GTIN 14桁固定
// AI(17) = 有効期限 6桁固定 YYMMDD
// AI(10) = ロット番号 可変長（最大20桁）FNC1区切り
// AI(21) = シリアル番号 可変長（最大20桁）
// AI(30) = 数量 可変長（最大8桁）

const GS1_AI_DEFINITIONS = {
  "01": { name: "GTIN", length: 14, fixed: true },
  "10": { name: "LOT", length: 20, fixed: false },
  "17": { name: "EXPIRY", length: 6, fixed: true },
  "21": { name: "SERIAL", length: 20, fixed: false },
  "30": { name: "QTY", length: 8, fixed: false },
};

const FNC1 = "\x1D"; // GS (Group Separator) = FNC1

function parseGS1Barcode(raw) {
  const result = { raw, gtin: null, gtin14: null, expiry: null, lot: null, serial: null, qty: null, errors: [] };
  if (!raw || raw.length < 2) {
    result.errors.push("バーコードデータが短すぎます");
    return result;
  }

  // FNC1プレフィックスを除去（一部リーダーは ]C1 や ]e0 を付加）
  let data = raw.replace(/^\]C1/, "").replace(/^\]e0/, "").replace(/^\]d2/, "");

  let pos = 0;
  const maxIter = 20;
  let iter = 0;

  while (pos < data.length && iter < maxIter) {
    iter++;
    // FNC1区切りをスキップ
    if (data[pos] === FNC1) { pos++; continue; }

    // AI を2桁で試行、なければ拡張AI（3-4桁）も試行
    let ai = data.substring(pos, pos + 2);
    let aiDef = GS1_AI_DEFINITIONS[ai];

    if (!aiDef) {
      // カッコ付き表記への対応 "(01)04987..."
      if (data[pos] === "(") {
        const closeIdx = data.indexOf(")", pos + 1);
        if (closeIdx !== -1) {
          ai = data.substring(pos + 1, closeIdx);
          aiDef = GS1_AI_DEFINITIONS[ai];
          pos = closeIdx + 1;
          if (aiDef) {
            // 下で値を読む
          } else {
            result.errors.push(`未対応AI: (${ai})`);
            break;
          }
        } else {
          break;
        }
      } else {
        // 不明なAI → 残りを読み飛ばし
        result.errors.push(`不明なAI: ${ai} (位置${pos})`);
        break;
      }
    } else {
      pos += ai.length;
    }

    if (!aiDef) break;

    let value;
    if (aiDef.fixed) {
      value = data.substring(pos, pos + aiDef.length);
      pos += aiDef.length;
    } else {
      // 可変長 → FNC1 or 文字列終端まで
      const fnc1Idx = data.indexOf(FNC1, pos);
      const end = fnc1Idx !== -1 ? fnc1Idx : data.length;
      // カッコ付きの場合は次の(まで
      const parenIdx = data.indexOf("(", pos);
      const actualEnd = parenIdx !== -1 && parenIdx < end ? parenIdx : end;
      value = data.substring(pos, actualEnd);
      pos = actualEnd;
    }

    switch (aiDef.name) {
      case "GTIN":
        result.gtin = value;
        // GTIN-14正規化（14桁に0パディング）
        result.gtin14 = value.padStart(14, "0");
        break;
      case "EXPIRY":
        if (value.length === 6) {
          const yy = value.substring(0, 2);
          const mm = value.substring(2, 4);
          const dd = value.substring(4, 6);
          const year = parseInt(yy) > 50 ? 1900 + parseInt(yy) : 2000 + parseInt(yy);
          result.expiry = { raw: value, year, month: parseInt(mm), day: parseInt(dd) === 0 ? null : parseInt(dd), formatted: `${year}/${mm}${dd === "00" ? "" : "/" + dd}` };
        }
        break;
      case "LOT": result.lot = value; break;
      case "SERIAL": result.serial = value; break;
      case "QTY": result.qty = parseInt(value); break;
    }
  }

  return result;
}

// GTINからJAN(GTIN-13)部分を抽出：GTIN-14の場合、先頭1桁(インジケータ)を除いた13桁
function gtin14ToJan(gtin14) {
  if (!gtin14) return null;
  const g = gtin14.padStart(14, "0");
  // 先頭が0ならGTIN-13のリーディングゼロ→そのまま後ろ13桁がJAN
  // 先頭が1-9ならインジケータ→2-13桁目がJANの1-12桁目（チェックデジットは異なる）
  if (g[0] === "0") return g.substring(1);
  // 販売包装のGTIN-14：2～13桁目がJANの1～12桁目と一致
  return g.substring(1, 13) + calcCheckDigit(g.substring(1, 13));
}

function calcCheckDigit(code12) {
  let sum = 0;
  for (let i = 0; i < 12; i++) {
    sum += parseInt(code12[i]) * (i % 2 === 0 ? 1 : 3);
  }
  return String((10 - (sum % 10)) % 10);
}

// ═══════════════════════════════════════════
// MEDISマスターCSVパーサー
// ═══════════════════════════════════════════
// HOTコードマスターの主要カラム（使用許諾取得後にダウンロードするCSV）:
// HOT9, 医薬品名称, YJコード, 薬価基準コード, レセ電コード, JANコード など
// 実際のフォーマットはMEDIS提供仕様に準拠

function parseDrugMasterCSV(csvText, mappingConfig) {
  const lines = csvText.split(/\r?\n/).filter((l) => l.trim());
  if (lines.length < 2) return { drugs: [], errors: ["CSVが空または不正です"] };

  const header = parseCSVLine(lines[0]);
  const cfg = mappingConfig || autoDetectColumns(header);

  if (!cfg.nameCol && cfg.nameCol !== 0) return { drugs: [], errors: ["薬品名カラムが見つかりません"] };

  const drugs = [];
  const errors = [];

  for (let i = 1; i < lines.length; i++) {
    try {
      const cols = parseCSVLine(lines[i]);
      const drug = {
        name: cols[cfg.nameCol]?.trim() || "",
        hot9: cfg.hot9Col != null ? cols[cfg.hot9Col]?.trim() : "",
        yjCode: cfg.yjCol != null ? cols[cfg.yjCol]?.trim() : "",
        janCode: cfg.janCol != null ? cols[cfg.janCol]?.trim() : "",
        receiptCode: cfg.receiptCol != null ? cols[cfg.receiptCol]?.trim() : "",
        yakkaCode: cfg.yakkaCol != null ? cols[cfg.yakkaCol]?.trim() : "",
        gtin14: "",
        unitName: cfg.unitCol != null ? cols[cfg.unitCol]?.trim() : "",
        strength: cfg.strengthCol != null ? cols[cfg.strengthCol]?.trim() : "",
      };

      // JAN → GTIN-14 変換
      if (drug.janCode && drug.janCode.length === 13) {
        drug.gtin14 = "0" + drug.janCode;
      }

      if (drug.name) drugs.push(drug);
    } catch (e) {
      errors.push(`行${i + 1}: パースエラー`);
    }
  }

  return { drugs, errors, header, mapping: cfg };
}

function parseCSVLine(line) {
  const result = [];
  let current = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ",") { result.push(current); current = ""; }
      else { current += ch; }
    }
  }
  result.push(current);
  return result;
}

function autoDetectColumns(header) {
  const cfg = {};
  const lowerHeader = header.map((h) => h.toLowerCase().trim());
  lowerHeader.forEach((h, i) => {
    if (/医薬品名|薬品名|名称|drugname|name/.test(h)) cfg.nameCol = i;
    if (/hot.*9|hot9/.test(h)) cfg.hot9Col = i;
    if (/yj|個別医薬品/.test(h)) cfg.yjCol = i;
    if (/jan|janコード/.test(h)) cfg.janCol = i;
    if (/レセ電|レセプト電算|receipt/.test(h)) cfg.receiptCol = i;
    if (/薬価基準|yakka/.test(h)) cfg.yakkaCol = i;
    if (/単位|unit/.test(h)) cfg.unitCol = i;
    if (/含量|力価|strength/.test(h)) cfg.strengthCol = i;
  });
  return cfg;
}

// ═══════════════════════════════════════════
// NSIPS / JAHIS 処方CSV パーサー
// ═══════════════════════════════════════════
// JAHIS院外処方箋2次元シンボル記録条件規約 (CSV形式) に準拠
// レコードNo.で種別を判別:
//   1: バージョン, 5: 患者氏名, 6: 患者生年月日, 11: 患者カナ
//   51: 医療機関, 61: 医師, 201: RP(処方グループ),
//   211: 薬品, 281: 薬品補足, 301: 用法, 391: 処方服用注意
// 薬品コード種別: 1=なし, 2=レセ電, 3=厚労省コード, 4=YJコード, 6=HOTコード, 7=一般名コード

function parseNSIPSPrescriptionCSV(csvText) {
  const lines = csvText.split(/\r?\n/).filter((l) => l.trim());
  const result = { patients: [], errors: [], rawRecords: [] };

  let currentPatient = null;
  let currentRP = null;
  let currentDrug = null;
  let rpDrugs = [];
  let allPrescriptions = [];
  let patientMap = {};

  for (let i = 0; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    const recNo = parseInt(cols[0]);
    result.rawRecords.push({ line: i + 1, recNo, cols });

    switch (recNo) {
      case 1: // バージョン
        // JAHIS version info — skip
        break;

      case 5: // 患者氏名: 5,患者氏名
        {
          const name = (cols[1] || "").trim();
          const key = name;
          if (!patientMap[key]) {
            currentPatient = {
              id: `NSIPS-${Object.keys(patientMap).length + 1}`,
              name,
              kana: "",
              age: 0,
              gender: "",
              prescriptionDate: new Date().toISOString().substring(0, 10),
              doctor: "",
              prescriptions: [],
              source: "NSIPS",
            };
            patientMap[key] = currentPatient;
          } else {
            currentPatient = patientMap[key];
          }
        }
        break;

      case 6: // 患者生年月日: 6,元号,年月日,性別
        if (currentPatient) {
          const gender = cols[3];
          currentPatient.gender = gender === "1" ? "男" : gender === "2" ? "女" : "";
          // 年齢計算（簡易）
          try {
            const gengo = parseInt(cols[1]); // 1=明治,2=大正,3=昭和,4=平成,5=令和
            const yymmdd = cols[2] || "";
            if (yymmdd.length >= 6) {
              const yy = parseInt(yymmdd.substring(0, 2));
              const mm = parseInt(yymmdd.substring(2, 4));
              const dd = parseInt(yymmdd.substring(4, 6));
              const baseYear = { 1: 1867, 2: 1911, 3: 1925, 4: 1988, 5: 2018 }[gengo] || 2000;
              const birthYear = baseYear + yy;
              currentPatient.age = new Date().getFullYear() - birthYear;
            }
          } catch (e) {}
        }
        break;

      case 11: // 患者カナ: 11,カナ
        if (currentPatient) currentPatient.kana = (cols[1] || "").trim();
        break;

      case 51: // 医療機関: 51,医療機関コード,医療機関名称,…
        // 処方日の抽出（cols[5]等に含まれる場合がある）
        break;

      case 61: // 医師: 61,医師カナ,医師漢字
        if (currentPatient) currentPatient.doctor = (cols[2] || cols[1] || "").trim();
        break;

      case 101: // 処方箋番号レコード
        break;

      case 111: // 処方発行日: 111,YYYYMMDD or 元号式
        if (currentPatient && cols[1]) {
          const d = cols[1].trim();
          if (d.length === 8) {
            currentPatient.prescriptionDate = `${d.substring(0, 4)}-${d.substring(4, 6)}-${d.substring(6, 8)}`;
          }
        }
        break;

      case 201: // RP: 201,RP番号,剤形区分,…
        currentRP = { rpNo: parseInt(cols[1]) || 0, drugs: [], usage: "", days: 0 };
        break;

      case 211: // 薬品: 211,薬品コード種別,薬品コード,薬品名称,用量,…
        {
          const codeType = parseInt(cols[1]) || 0;
          const code = (cols[2] || "").trim();
          const drugName = (cols[3] || "").trim();
          const dosageStr = (cols[4] || "").trim();
          const dosage = parseFloat(dosageStr) || 0;
          const unit = (cols[5] || "").trim() || "g";

          currentDrug = {
            drugName,
            yjCode: codeType === 4 ? code : "",
            hot9: codeType === 6 ? code : "",
            receiptCode: codeType === 2 ? code : "",
            codeType,
            code,
            dosage,
            unit,
            days: 0,
            totalMg: 0,
            totalG: 0,
            rpNo: currentRP ? currentRP.rpNo : 0,
            rpUsage: "",
            rpDays: 0,
            isAdded: false, // 手動追加フラグ
          };

          if (currentRP) currentRP.drugs.push(currentDrug);
        }
        break;

      case 281: // 薬品補足
        break;

      case 291: // 薬品単位変換
        break;

      case 301: // 用法: 301,用法コード種別,用法コード,用法名称,調剤数量(日数/回数)
        {
          const days = parseInt(cols[4]) || 0;
          if (currentRP) {
            currentRP.usage = (cols[3] || "").trim();
            currentRP.days = days;
            currentRP.drugs.forEach((d) => {
              d.days = days;
              d.rpUsage = currentRP.usage;
              d.rpDays = days;
              if (d.unit === "g" || d.unit === "G") {
                d.totalG = d.dosage * days;
                d.totalMg = d.totalG * 1000;
              } else if (d.unit === "mg" || d.unit === "MG") {
                d.totalMg = d.dosage * days;
                d.totalG = d.totalMg / 1000;
              } else {
                d.totalG = d.dosage * days;
                d.totalMg = d.totalG * 1000;
              }
            });
          }

          if (currentRP && currentPatient) {
            currentRP.drugs.forEach((d) => {
              currentPatient.prescriptions.push(d);
            });
          }
          currentRP = null;
        }
        break;

      case 391: // 処方服用注意
        break;

      case 501: // 備考
        break;

      default:
        break;
    }
  }

  result.patients = Object.values(patientMap).filter((p) => p.prescriptions.length > 0);
  return result;
}

// 汎用NSIPS CSV（レセコン独自形式）のフレキシブルパーサー
// ヘッダー行があるタブ区切り/カンマ区切りファイルに対応
function parseGenericNSIPSCSV(csvText) {
  const lines = csvText.split(/\r?\n/).filter((l) => l.trim());
  if (lines.length < 2) return { patients: [], errors: ["データが空です"] };

  // 先頭行がレコード番号（数字）で始まるか確認 → JAHIS形式
  const firstField = lines[0].split(",")[0].trim();
  if (/^\d+$/.test(firstField) && parseInt(firstField) <= 10) {
    return parseNSIPSPrescriptionCSV(csvText);
  }

  // ヘッダー付きCSV → カラム名で自動検出
  const sep = lines[0].includes("\t") ? "\t" : ",";
  const header = lines[0].split(sep).map((h) => h.trim());
  const lh = header.map((h) => h.toLowerCase());

  const nameIdx = lh.findIndex((h) => /患者名|患者氏名|氏名|name/.test(h));
  const drugIdx = lh.findIndex((h) => /薬品名|医薬品名|drug/.test(h));
  const doseIdx = lh.findIndex((h) => /用量|1日量|dose/.test(h));
  const daysIdx = lh.findIndex((h) => /日数|投与日数|days/.test(h));
  const unitIdx = lh.findIndex((h) => /単位|unit/.test(h));
  const yjIdx = lh.findIndex((h) => /yj|yjコード|個別医薬品/.test(h));
  const hotIdx = lh.findIndex((h) => /hot/.test(h));
  const recIdx = lh.findIndex((h) => /レセ電|レセプト/.test(h));
  const kanaIdx = lh.findIndex((h) => /カナ|kana/.test(h));
  const doctorIdx = lh.findIndex((h) => /医師|doctor/.test(h));
  const dateIdx = lh.findIndex((h) => /処方日|日付|date/.test(h));

  if (nameIdx === -1 || drugIdx === -1) {
    return { patients: [], errors: ["患者名または薬品名カラムが見つかりません。カラム名を確認してください。"] };
  }

  const patientMap = {};
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(sep);
    const pName = (cols[nameIdx] || "").trim();
    if (!pName) continue;

    if (!patientMap[pName]) {
      patientMap[pName] = {
        id: `CSV-${Object.keys(patientMap).length + 1}`,
        name: pName,
        kana: kanaIdx >= 0 ? (cols[kanaIdx] || "").trim() : "",
        age: 0, gender: "",
        prescriptionDate: dateIdx >= 0 ? (cols[dateIdx] || "").trim() : new Date().toISOString().substring(0, 10),
        doctor: doctorIdx >= 0 ? (cols[doctorIdx] || "").trim() : "",
        prescriptions: [],
        source: "CSV",
      };
    }

    const dosage = parseFloat(cols[doseIdx] || "0") || 0;
    const days = parseInt(cols[daysIdx] || "0") || 0;
    const unit = unitIdx >= 0 ? (cols[unitIdx] || "g").trim() : "g";
    let totalG, totalMg;
    if (unit === "mg" || unit === "MG") {
      totalMg = dosage * days; totalG = totalMg / 1000;
    } else {
      totalG = dosage * days; totalMg = totalG * 1000;
    }

    patientMap[pName].prescriptions.push({
      drugName: (cols[drugIdx] || "").trim(),
      yjCode: yjIdx >= 0 ? (cols[yjIdx] || "").trim() : "",
      hot9: hotIdx >= 0 ? (cols[hotIdx] || "").trim() : "",
      receiptCode: recIdx >= 0 ? (cols[recIdx] || "").trim() : "",
      dosage, unit, days, totalMg, totalG,
    });
  }

  return { patients: Object.values(patientMap).filter((p) => p.prescriptions.length > 0), errors: [] };
}

// ═══════════════════════════════════════════
// 音声
// ═══════════════════════════════════════════
const playSound = (type) => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (type === "success") {
      [0, 0.15, 0.3].forEach((d) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 2200; o.type = "sine";
        g.gain.setValueAtTime(0, ctx.currentTime + d);
        g.gain.linearRampToValueAtTime(0.3, ctx.currentTime + d + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d + 0.12);
        o.start(ctx.currentTime + d); o.stop(ctx.currentTime + d + 0.15);
      });
    } else if (type === "confirm") {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; o.type = "sine";
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o.start(); o.stop(ctx.currentTime + 0.5);
    } else if (type === "error") {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 200; o.type = "square";
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      o.start(); o.stop(ctx.currentTime + 0.6);
    }
  } catch (e) {}
};
