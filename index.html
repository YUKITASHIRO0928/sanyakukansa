// ═══════════════════════════════════════════
// 電子天秤 Web Serial API 接続
// ═══════════════════════════════════════════
// CP2104 USB-UART Bridge 経由で接続
// 一般的な電子天秤のシリアル通信設定を自動試行

const SCALE_BAUD_RATES = [2400, 4800, 9600, 19200]; // 試行するボーレート
// 一般的な電子天秤のデータ要求コマンド（各メーカー対応）
const SCALE_REQUEST_CMDS = ["Q\r\n", "S\r\n", "SI\r\n", "P\r\n", "?W\r\n", "D\r\n", "\x1BQ\r\n"];

async function connectScale(onData, onStatus) {
  if (!navigator.serial) {
    onStatus("error", "このブラウザはWeb Serial APIに対応していません。Chromeを使ってください。");
    return null;
  }
  try {
    onStatus("connecting", "天秤を選択してください...");
    const port = await navigator.serial.requestPort();
    
    // LB-600S2は4800bps設定
    const baudOrder = [4800, 9600, 2400, 19200];
    let connected = false;
    
    for (const baud of baudOrder) {
      try {
        await port.open({ baudRate: baud, dataBits: 8, stopBits: 2, parity: "none", flowControl: "none" });
        connected = true;
        onStatus("connected", `接続成功 (${baud}bps) - データ取得中...`);
        
        const reader = port.readable.getReader();
        const writer = port.writable.getWriter();
        const decoder = new TextDecoder();
        const encoder = new TextEncoder();
        let buffer = "";
        let dataReceived = false;
        let pollTimer = null;
        let cmdIndex = 0;
        
        // 読み取りループ
        const readLoop = async () => {
          try {
            while (true) {
              const { value, done } = await reader.read();
              if (done) break;
              buffer += decoder.decode(value, { stream: true });
              
              const lines = buffer.split(/[\r\n]+/);
              buffer = lines.pop() || "";
              
              for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;
                
                // 数値を抽出（様々な天秤の出力フォーマットに対応）
                // 例: "ST,+   0.000 g", "  0.000g", "+0.000", "N +  12.345 g", "  46.5 g"
                const match = trimmed.match(/[+-]?\s*\d+\.?\d*/);
                if (match) {
                  const val = parseFloat(match[0].replace(/\s/g, ""));
                  if (!isNaN(val)) {
                    dataReceived = true;
                    onData(val, trimmed);
                    onStatus("connected", `接続中 (${baud}bps) ✅ データ受信中`);
                  }
                }
              }
            }
          } catch (e) {
            if (e.name !== "NetworkError") {
              onStatus("error", `読取エラー: ${e.message}`);
            }
          }
        };
        readLoop();
        
        // ポーリング: 定期的にデータ要求コマンドを送信
        const sendCmd = async (cmd) => {
          try { await writer.write(encoder.encode(cmd)); } catch(e) {}
        };
        
        // 最初に全コマンドを試す（どれが反応するか探す）
        let workingCmd = null;
        const tryCommands = async () => {
          for (const cmd of SCALE_REQUEST_CMDS) {
            await sendCmd(cmd);
            await new Promise(r => setTimeout(r, 300));
            if (dataReceived) {
              workingCmd = cmd;
              onStatus("connected", `接続中 (${baud}bps) ✅ データ受信中`);
              break;
            }
          }
        };
        await tryCommands();
        
        // 定期ポーリング開始（100ms間隔 = 秒10回更新）
        pollTimer = setInterval(async () => {
          if (workingCmd) {
            await sendCmd(workingCmd);
          } else {
            // まだ動作するコマンドが見つかっていない場合、順番に試す
            await sendCmd(SCALE_REQUEST_CMDS[cmdIndex % SCALE_REQUEST_CMDS.length]);
            cmdIndex++;
            if (dataReceived) {
              workingCmd = SCALE_REQUEST_CMDS[(cmdIndex - 1) % SCALE_REQUEST_CMDS.length];
            }
          }
        }, 100);
        
        if (!dataReceived) {
          onStatus("connected", `接続中 (${baud}bps) - コマンド探索中... 天秤に物を載せたり降ろしたりしてみてください`);
          // 連続送信モードの場合もあるので、そのまま待機（readLoopが受信する）
        }
        
        return { port, reader, writer, baudRate: baud, pollTimer };
      } catch (e) {
        try { await port.close(); } catch (ce) {}
        continue;
      }
    }
    if (!connected) {
      onStatus("error", "接続失敗: 全てのボーレートで接続できませんでした");
    }
    return null;
  } catch (e) {
    if (e.name === "NotFoundError") {
      onStatus("idle", "キャンセルされました");
    } else {
      onStatus("error", `エラー: ${e.message}`);
    }
    return null;
  }
}

async function disconnectScale(conn) {
  if (!conn) return;
  try {
    if (conn.pollTimer) clearInterval(conn.pollTimer);
    if (conn.writer) conn.writer.releaseLock();
    if (conn.reader) { await conn.reader.cancel(); conn.reader.releaseLock(); }
    if (conn.port) { await conn.port.close(); }
  } catch (e) {}
}

// ═══════════════════════════════════════════
// メインApp
// ═══════════════════════════════════════════
const PAGES = { MASTER: "master", DISPENSING: "dispensing", HISTORY: "history" };
const STEPS = { SELECT_PATIENT: 0, SCAN_DRUG: 1, WEIGHING: 2, COMPLETE: 3 };
const TOLERANCE = 0.03;

const C = {
  bg: "#f0f4f8", card: "#ffffff", border: "#dde5ef", borderFocus: "#3b82f6",
  text: "#1e293b", textSub: "#64748b", textMuted: "#94a3b8",
  primary: "#3b82f6", primaryLight: "#eff6ff", primaryDark: "#1d4ed8",
  success: "#10b981", successLight: "#ecfdf5", successBorder: "#6ee7b7",
  warning: "#f59e0b", warningLight: "#fffbeb",
  danger: "#ef4444", dangerLight: "#fef2f2",
  headerBg: "linear-gradient(135deg, #3b82f6 0%, #2563eb 100%)",
};

function App() {
  const [page, setPage] = useState(PAGES.DISPENSING);
  const [drugMaster, setDrugMaster] = useState([]);
  const [masterLoadInfo, setMasterLoadInfo] = useState(null);
  const [nsipsPatients, setNsipsPatients] = useState([]);
  const [nsipsLoadInfo, setNsipsLoadInfo] = useState(null);

  // NSIPSサーバー接続
  const [serverUrl, setServerUrl] = useState("http://localhost:3456");
  const [serverStatus, setServerStatus] = useState("disconnected"); // disconnected, connecting, connected, error
  const [serverFiles, setServerFiles] = useState([]);
  const [selectedServerFile, setSelectedServerFile] = useState(null);
  const wsRef = useRef(null);

  // サーバー接続
  const connectToServer = useCallback(async (baseUrl) => {
    const cleanUrl = baseUrl.replace(/\/+$/, "");
    setServerStatus("connecting");
    try {
      const res = await fetch(`${cleanUrl}/api/status`);
      const data = await res.json();
      if (data.status === "running") {
        setServerStatus("connected");
        // ファイル一覧取得
        const filesRes = await fetch(`${cleanUrl}/api/files`);
        const filesData = await filesRes.json();
        setServerFiles(filesData.files || []);
        // 履歴読込
        loadHistoryFromServer(cleanUrl);
        // GTIN紐付けテーブル読込
        loadGtinMap(cleanUrl);
        // 保留セッション読込
        loadPendingSessions(cleanUrl);
        // WebSocket接続
        const wsUrl = cleanUrl.replace(/^http/, "ws") + "/ws";
        if (wsRef.current) { try { wsRef.current.close(); } catch (e) {} }
        const ws = new WebSocket(wsUrl);
        ws.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === "files_updated") {
              setServerFiles(msg.files || []);
            }
          } catch (e) {}
        };
        ws.onclose = () => setServerStatus("disconnected");
        ws.onerror = () => setServerStatus("error");
        wsRef.current = ws;
      }
    } catch (e) {
      setServerStatus("error");
    }
  }, []);

  // サーバーからファイル読み込み → 処方パース
  const loadServerFile = useCallback(async (fileName) => {
    const cleanUrl = serverUrl.replace(/\/+$/, "");
    try {
      const res = await fetch(`${cleanUrl}/api/file?name=${encodeURIComponent(fileName)}`);
      const buf = await res.arrayBuffer();
      // Shift_JIS → UTF-8 変換
      const decoder = new TextDecoder("shift_jis");
      const text = decoder.decode(buf);
      const result = parseGenericNSIPSCSV(text);
      if (result.patients.length > 0) {
        setNsipsPatients(result.patients);
        setNsipsLoadInfo({
          filename: fileName,
          patientCount: result.patients.length,
          totalRx: result.patients.reduce((s, p) => s + p.prescriptions.length, 0),
          errors: result.errors,
          loadedAt: new Date().toISOString(),
          source: "server",
        });
        setSelectedServerFile(fileName);
      }
    } catch (e) {
      console.error("ファイル読込エラー:", e);
    }
  }, [serverUrl]);

  // 患者リスト: NSIPS読込済なら優先、なければモック
  const patients = nsipsPatients.length > 0 ? nsipsPatients : MOCK_PATIENTS;

  // 調剤ステート
  const [step, setStep] = useState(STEPS.SELECT_PATIENT);
  const [selectedPatient, setSelectedPatient] = useState(null);
  const [currentDrugIndex, setCurrentDrugIndex] = useState(0);
  const [barcodeInput, setBarcodeInput] = useState("");
  const [scaleValue, setScaleValue] = useState(0);
  const [prevScaleValue, setPrevScaleValue] = useState(0);
  const [isWithinTolerance, setIsWithinTolerance] = useState(false);
  const [soundInterval, setSoundInterval] = useState(null);
  const [confirmedDrugs, setConfirmedDrugs] = useState([]);
  const [errorMsg, setErrorMsg] = useState("");
  const [history, setHistory] = useState([]);
  const [drugConfirmed, setDrugConfirmed] = useState(false);
  const [lastScanResult, setLastScanResult] = useState(null);
  const [pendingSessions, setPendingSessions] = useState([]); // 一時保存セッション
  const [showAddDrug, setShowAddDrug] = useState(false); // 薬剤追加ダイアログ
  const [addDrugGtin, setAddDrugGtin] = useState(""); // 追加薬剤のバーコード入力
  const [addDrugInfo, setAddDrugInfo] = useState(null); // 追加薬剤のGTIN解析結果
  const [addDrugName, setAddDrugName] = useState(""); // 追加薬剤名
  const [addDrugDosage, setAddDrugDosage] = useState(""); // 1日量
  const [addDrugUnit, setAddDrugUnit] = useState("g"); // 単位
  const [addDrugRpNo, setAddDrugRpNo] = useState(0); // 追加先Rp番号

  // 天秤接続
  const [scaleConn, setScaleConn] = useState(null);
  const [scaleStatus, setScaleStatus] = useState("idle"); // idle, connecting, connected, error
  const [scaleStatusMsg, setScaleStatusMsg] = useState("");
  const [scaleRawData, setScaleRawData] = useState("");

  const barcodeRef = useRef(null);
  const scaleRef = useRef(null);
  const toleranceRef = useRef(false);

  // GTIN⇔レセ電コード 紐付けテーブル
  const [gtinMap, setGtinMap] = useState({}); // { "04987123456789": { receiptCode: "612340071", drugName: "アムロジピン...", registeredAt: "..." } }
  const [showGtinRegister, setShowGtinRegister] = useState(false);
  const [pendingGtin, setPendingGtin] = useState(null); // 未登録GTINの一時保持

  // サーバーからGTIN紐付けテーブル読込
  const loadGtinMap = useCallback(async (baseUrl) => {
    try {
      const res = await fetch(`${baseUrl.replace(/\/+$/, "")}/api/gtinmap`);
      const data = await res.json();
      if (data.map) setGtinMap(data.map);
    } catch (e) {}
  }, []);

  // GTIN紐付け保存
  const saveGtinMapping = async (gtin14, drugInfo) => {
    const newMap = { ...gtinMap, [gtin14]: { ...drugInfo, registeredAt: new Date().toISOString() } };
    setGtinMap(newMap);
    if (serverStatus === "connected") {
      try {
        const cleanUrl = serverUrl.replace(/\/+$/, "");
        await fetch(`${cleanUrl}/api/gtinmap`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(newMap),
        });
      } catch (e) { console.error("GTIN保存エラー:", e); }
    }
  };

  const currentDrug = selectedPatient?.prescriptions[currentDrugIndex];

  // 起動時にサーバー自動接続を試行
  useEffect(() => {
    connectToServer(serverUrl);
  }, []);

  // ── マスターCSV読み込み ──
  const handleMasterFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      const result = parseDrugMasterCSV(text);
      setDrugMaster(result.drugs);
      setMasterLoadInfo({
        filename: file.name,
        count: result.drugs.length,
        errors: result.errors,
        header: result.header,
        mapping: result.mapping,
        loadedAt: new Date().toISOString(),
      });
    };
    reader.readAsText(file, "Shift_JIS"); // MEDIS CSVはShift_JIS多い
  };

  // ── NSIPS処方CSV読み込み ──
  const handleNSIPSFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      const result = parseGenericNSIPSCSV(text);
      setNsipsPatients(result.patients);
      setNsipsLoadInfo({
        filename: file.name,
        patientCount: result.patients.length,
        totalRx: result.patients.reduce((s, p) => s + p.prescriptions.length, 0),
        errors: result.errors,
        loadedAt: new Date().toISOString(),
      });
    };
    reader.readAsText(file, "Shift_JIS");
  };

  // ── GS-1照合 ──
  const lookupDrugByGTIN = (gtin14) => {
    return drugMaster.find((d) => d.gtin14 === gtin14);
  };

  const lookupDrugByYJ = (yjCode) => {
    return drugMaster.find((d) => d.yjCode === yjCode);
  };

  // バーコードスキャン → GS-1パース → 処方内の未秤量薬を検索
  const handleBarcodeScan = () => {
    setErrorMsg("");
    setLastScanResult(null);
    setShowGtinRegister(false);
    const raw = barcodeInput.trim();
    if (!raw) return;

    const parsed = parseGS1Barcode(raw);
    setLastScanResult(parsed);

    if (!parsed.gtin14 && !parsed.gtin) {
      parsed.gtin14 = raw.padStart(14, "0");
    }

    const gtin = parsed.gtin14;
    const mapping = gtinMap[gtin];

    if (!selectedPatient) return;

    // 確定済みの薬品名リスト
    const confirmedNames = confirmedDrugs.map(d => d.drugName);

    if (mapping) {
      // 登録済みGTIN → 処方内の未秤量薬から一致を探す
      const matchIdx = selectedPatient.prescriptions.findIndex((rx, i) => {
        if (confirmedNames.includes(rx.drugName)) return false; // 秤量済みはスキップ
        return (
          (mapping.receiptCode && (mapping.receiptCode === rx.receiptCode || mapping.receiptCode === rx.code)) ||
          (mapping.yjCode && mapping.yjCode === rx.yjCode) ||
          (mapping.drugName && mapping.drugName === rx.drugName)
        );
      });

      if (matchIdx >= 0) {
        playSound("confirm");
        setCurrentDrugIndex(matchIdx);
        setStep(STEPS.WEIGHING);
        setTimeout(() => scaleRef.current?.focus(), 100);
      } else {
        playSound("error");
        // 処方にない or 秤量済み
        const alreadyDone = selectedPatient.prescriptions.some((rx) =>
          confirmedNames.includes(rx.drugName) && mapping.drugName === rx.drugName
        );
        if (alreadyDone) {
          setErrorMsg(`${mapping.drugName} は秤量済みです`);
        } else {
          setErrorMsg(`${mapping.drugName} はこの処方に含まれていません`);
        }
        setBarcodeInput("");
        setTimeout(() => barcodeRef.current?.focus(), 100);
      }
    } else {
      // 未登録GTIN → 登録ダイアログ表示
      playSound("confirm");
      setPendingGtin(gtin);
      setShowGtinRegister(true);
    }
  };

  // 初回登録: 処方リストから選んでGTIN紐付け → そのまま秤量開始
  const registerGtinWithDrug = async (drug, rxIndex) => {
    if (!pendingGtin) return;
    await saveGtinMapping(pendingGtin, {
      drugName: drug.drugName,
      receiptCode: drug.receiptCode || drug.code || "",
      yjCode: drug.yjCode || "",
    });
    setShowGtinRegister(false);
    setPendingGtin(null);

    // 登録した薬が未秤量なら、そのまま秤量開始
    const confirmedNames = confirmedDrugs.map(d => d.drugName);
    if (!confirmedNames.includes(drug.drugName)) {
      playSound("confirm");
      setCurrentDrugIndex(rxIndex);
      setStep(STEPS.WEIGHING);
      setTimeout(() => scaleRef.current?.focus(), 100);
    } else {
      setErrorMsg(`${drug.drugName} は秤量済みです`);
      setBarcodeInput("");
    }
  };

  // 秤量
  const checkTolerance = useCallback((value) => {
    if (!currentDrug) return false;
    const diff = Math.abs(value - currentDrug.totalG);
    return diff / currentDrug.totalG <= TOLERANCE;
  }, [currentDrug]);

  useEffect(() => {
    if (step !== STEPS.WEIGHING || !currentDrug) return;
    const within = checkTolerance(scaleValue);
    setIsWithinTolerance(within);
    toleranceRef.current = within;

    if (prevScaleValue > 0 && scaleValue <= 0 && !drugConfirmed) {
      if (toleranceRef.current || checkTolerance(prevScaleValue)) {
        setDrugConfirmed(true);
        playSound("confirm");
        setConfirmedDrugs((prev) => [...prev, { ...currentDrug, measuredG: prevScaleValue, timestamp: new Date().toISOString() }]);
        setTimeout(() => {
          const newConfirmedCount = confirmedDrugs.length + 1;
          if (newConfirmedCount < selectedPatient.prescriptions.length) {
            // まだ未秤量の薬がある → スキャン待ちに戻る
            setScaleValue(0); setPrevScaleValue(0); setDrugConfirmed(false);
            setBarcodeInput(""); setLastScanResult(null); setStep(STEPS.SCAN_DRUG);
            setTimeout(() => barcodeRef.current?.focus(), 100);
          } else {
            setStep(STEPS.COMPLETE);
          }
        }, 1200);
      }
    }
  }, [scaleValue]);

  useEffect(() => {
    if (isWithinTolerance && step === STEPS.WEIGHING && !drugConfirmed) {
      if (!soundInterval) { setSoundInterval(setInterval(() => playSound("success"), 500)); }
    } else {
      if (soundInterval) { clearInterval(soundInterval); setSoundInterval(null); }
    }
    return () => { if (soundInterval) clearInterval(soundInterval); };
  }, [isWithinTolerance, step, drugConfirmed]);

  const handleScaleInput = (e) => {
    const val = parseFloat(e.target.value) || 0;
    setPrevScaleValue(scaleValue);
    setScaleValue(val);
  };

  // 天秤接続
  const handleConnectScale = async () => {
    if (scaleConn) {
      await disconnectScale(scaleConn);
      setScaleConn(null);
      setScaleStatus("idle");
      setScaleStatusMsg("");
      return;
    }
    const conn = await connectScale(
      (val, raw) => {
        // 天秤からデータ受信 → 秤量値を更新
        setPrevScaleValue((prev) => prev);
        setScaleValue((prev) => {
          setPrevScaleValue(prev);
          return val;
        });
        setScaleRawData(raw);
      },
      (status, msg) => {
        setScaleStatus(status);
        setScaleStatusMsg(msg);
      }
    );
    if (conn) setScaleConn(conn);
  };

  const selectPatient = (p) => {
    setSelectedPatient(p); setCurrentDrugIndex(0); setConfirmedDrugs([]);
    setBarcodeInput(""); setScaleValue(0); setPrevScaleValue(0);
    setDrugConfirmed(false); setErrorMsg(""); setLastScanResult(null);
    setStep(STEPS.SCAN_DRUG);
  };

  const saveRecord = async () => {
    const record = { id: `R${Date.now()}`, patient: selectedPatient, drugs: confirmedDrugs, completedAt: new Date().toISOString(), operator: "テスト薬剤師" };
    // サーバー接続中ならAPI経由で永続保存
    if (serverStatus === "connected") {
      try {
        const cleanUrl = serverUrl.replace(/\/+$/, "");
        await fetch(`${cleanUrl}/api/history`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(record),
        });
      } catch (e) { console.error("履歴保存エラー:", e); }
    }
    setHistory((prev) => [record, ...prev]);
    resetAll();
  };

  // サーバーから履歴を読み込む
  const loadHistoryFromServer = useCallback(async (baseUrl) => {
    try {
      const res = await fetch(`${baseUrl.replace(/\/+$/, "")}/api/history`);
      const data = await res.json();
      if (data.records) setHistory(data.records);
    } catch (e) {}
  }, []);

  // ── 一時保存（保留） ──
  const savePendingSession = async () => {
    if (!selectedPatient) return;
    const session = {
      id: `PND-${Date.now()}`,
      patient: selectedPatient,
      confirmedDrugs: [...confirmedDrugs],
      savedAt: new Date().toISOString(),
      totalPrescriptions: selectedPatient.prescriptions.length,
    };
    const updated = [...pendingSessions.filter(s => s.patient.id !== selectedPatient.id), session];
    setPendingSessions(updated);
    if (serverStatus === "connected") {
      try {
        const cleanUrl = serverUrl.replace(/\/+$/, "");
        await fetch(`${cleanUrl}/api/pending`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessions: updated }),
        });
      } catch (e) {}
    }
    resetAll();
  };

  // 保留セッションを再開
  const resumeSession = (session) => {
    setSelectedPatient(session.patient);
    setConfirmedDrugs(session.confirmedDrugs || []);
    setCurrentDrugIndex(0);
    setBarcodeInput(""); setScaleValue(0); setPrevScaleValue(0);
    setDrugConfirmed(false); setErrorMsg(""); setLastScanResult(null);
    setStep(STEPS.SCAN_DRUG);
    // 保留リストから削除
    const updated = pendingSessions.filter(s => s.id !== session.id);
    setPendingSessions(updated);
    if (serverStatus === "connected") {
      try {
        const cleanUrl = serverUrl.replace(/\/+$/, "");
        fetch(`${cleanUrl}/api/pending`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessions: updated }),
        });
      } catch (e) {}
    }
  };

  // サーバーから保留セッション読込
  const loadPendingSessions = useCallback(async (baseUrl) => {
    try {
      const res = await fetch(`${baseUrl.replace(/\/+$/, "")}/api/pending`);
      const data = await res.json();
      if (data.sessions) setPendingSessions(data.sessions);
    } catch (e) {}
  }, []);

  const resetAll = () => {
    setStep(STEPS.SELECT_PATIENT); setSelectedPatient(null); setCurrentDrugIndex(0);
    setConfirmedDrugs([]); setBarcodeInput(""); setScaleValue(0); setPrevScaleValue(0);
    setDrugConfirmed(false); setErrorMsg(""); setLastScanResult(null);
    setShowAddDrug(false);
  };

  // ── 薬剤追加 ──
  const openAddDrug = () => {
    setShowAddDrug(true);
    setAddDrugGtin(""); setAddDrugInfo(null); setAddDrugName("");
    setAddDrugDosage(""); setAddDrugUnit("g"); setAddDrugRpNo(0);
  };

  const scanAddDrug = () => {
    const raw = addDrugGtin.trim();
    if (!raw) return;
    const parsed = parseGS1Barcode(raw);
    if (!parsed.gtin14) parsed.gtin14 = raw.padStart(14, "0");
    setAddDrugInfo(parsed);
    // gtinMapに登録済みなら薬品名を自動セット
    const mapping = gtinMap[parsed.gtin14];
    if (mapping) setAddDrugName(mapping.drugName);
  };

  const confirmAddDrug = () => {
    if (!selectedPatient || !addDrugName || !addDrugDosage) return;
    // 追加先Rpの情報を取得
    const rpDrugs = selectedPatient.prescriptions.filter(rx => rx.rpNo === addDrugRpNo);
    const rpDays = rpDrugs.length > 0 ? rpDrugs[0].rpDays || rpDrugs[0].days : 0;
    const rpUsage = rpDrugs.length > 0 ? rpDrugs[0].rpUsage || "" : "";
    const dosage = parseFloat(addDrugDosage) || 0;
    const days = rpDays;
    let totalG, totalMg;
    if (addDrugUnit === "mg" || addDrugUnit === "MG") {
      totalMg = dosage * days; totalG = totalMg / 1000;
    } else {
      totalG = dosage * days; totalMg = totalG * 1000;
    }

    const newDrug = {
      drugName: addDrugName,
      dosage, unit: addDrugUnit, days, totalG, totalMg,
      rpNo: addDrugRpNo, rpUsage, rpDays: days,
      isAdded: true, // 手動追加フラグ
      yjCode: "", receiptCode: "", code: "",
    };

    // GTIN紐付けも保存
    if (addDrugInfo?.gtin14 && addDrugName) {
      saveGtinMapping(addDrugInfo.gtin14, { drugName: addDrugName, receiptCode: "", yjCode: "" });
    }

    // 処方リストに追加
    const updated = { ...selectedPatient, prescriptions: [...selectedPatient.prescriptions, newDrug] };
    setSelectedPatient(updated);
    setShowAddDrug(false);
  };

  // Rpグループを取得するヘルパー
  const getRpGroups = (prescriptions) => {
    const groups = {};
    (prescriptions || []).forEach((rx) => {
      const rp = rx.rpNo || 0;
      if (!groups[rp]) groups[rp] = { rpNo: rp, usage: rx.rpUsage || "", days: rx.rpDays || rx.days || 0, drugs: [] };
      groups[rp].drugs.push(rx);
    });
    return Object.values(groups).sort((a, b) => a.rpNo - b.rpNo);
  };

  useEffect(() => {
    const handler = (e) => {
      if (e.key === "Enter" && step === STEPS.SCAN_DRUG && barcodeInput.trim()) handleBarcodeScan();
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [step, barcodeInput, currentDrug, drugMaster]);

  const progressPercent = selectedPatient ? (confirmedDrugs.length / selectedPatient.prescriptions.length) * 100 : 0;

  // ── スタイルヘルパー ──
  const btnStyle = (active) => ({
    background: active ? "rgba(255,255,255,0.25)" : "rgba(255,255,255,0.08)",
    border: "1px solid rgba(255,255,255,0.3)", borderRadius: 8,
    color: "#fff", padding: "8px 18px", cursor: "pointer", fontSize: 13, fontWeight: 600,
    transition: "all 0.15s",
  });

  const cardStyle = {
    background: C.card, border: `1px solid ${C.border}`, borderRadius: 14,
    boxShadow: "0 1px 4px rgba(0,0,0,0.04)",
  };

  // ═══════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════
  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: "'Noto Sans JP','Segoe UI',sans-serif" }}>
      {/* HEADER */}
      <header style={{ background: C.headerBg, padding: "12px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", boxShadow: "0 2px 12px rgba(59,130,246,0.15)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ width: 40, height: 40, borderRadius: 12, background: "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>⚖️</div>
          <div>
            <div style={{ fontSize: 17, fontWeight: 700, color: "#fff" }}>散薬調剤支援システム</div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.65)" }}>v0.6 — オールインワン（サーバー配信＋履歴永続化）</div>
          </div>
        </div>
        <nav style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <button onClick={() => setPage(PAGES.MASTER)} style={btnStyle(page === PAGES.MASTER)}>
            📦 薬品マスター{drugMaster.length > 0 ? ` (${drugMaster.length})` : ""}
          </button>
          <button onClick={() => setPage(PAGES.DISPENSING)} style={btnStyle(page === PAGES.DISPENSING)}>⚖️ 調剤</button>
          <button onClick={() => setPage(PAGES.HISTORY)} style={btnStyle(page === PAGES.HISTORY)}>
            📋 履歴{history.length > 0 ? ` (${history.length})` : ""}
          </button>
        </nav>
      </header>

      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "20px 24px" }}>

        {/* ════════════════ マスター管理ページ ════════════════ */}
        {page === PAGES.MASTER && (
          <div>
            <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 16 }}>📦 薬品マスター管理</h2>

            {/* アップロード */}
            <div style={{ ...cardStyle, padding: 24, marginBottom: 20 }}>
              <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 12 }}>CSVファイルを読み込む</div>
              <p style={{ fontSize: 13, color: C.textSub, marginBottom: 16, lineHeight: 1.7 }}>
                MEDIS HOTコードマスター、または医薬品コード対応表（CSV形式）をアップロードしてください。
                カラム名から自動的にHOT9・YJコード・JANコード・薬品名を検出します。
                JANコード（13桁）からGTIN-14への変換は自動で行います。
              </p>
              <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                <label style={{
                  display: "inline-flex", alignItems: "center", gap: 8,
                  background: C.primary, color: "#fff", padding: "10px 24px",
                  borderRadius: 10, cursor: "pointer", fontSize: 14, fontWeight: 600,
                  boxShadow: "0 2px 8px rgba(59,130,246,0.2)",
                }}>
                  📂 CSVファイルを選択
                  <input type="file" accept=".csv,.tsv,.txt" onChange={handleMasterFile} style={{ display: "none" }} />
                </label>
                {masterLoadInfo && (
                  <span style={{ fontSize: 13, color: C.success, fontWeight: 600 }}>
                    ✅ {masterLoadInfo.filename} — {masterLoadInfo.count}件読込済
                  </span>
                )}
              </div>
              {masterLoadInfo?.errors?.length > 0 && (
                <div style={{ marginTop: 12, fontSize: 12, color: C.danger }}>
                  {masterLoadInfo.errors.map((e, i) => <div key={i}>⚠ {e}</div>)}
                </div>
              )}
            </div>

            {/* カラムマッピング情報 */}
            {masterLoadInfo?.mapping && (
              <div style={{ ...cardStyle, padding: 20, marginBottom: 20 }}>
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 10 }}>検出されたカラムマッピング</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {[
                    ["薬品名", masterLoadInfo.mapping.nameCol],
                    ["HOT9", masterLoadInfo.mapping.hot9Col],
                    ["YJコード", masterLoadInfo.mapping.yjCol],
                    ["JANコード", masterLoadInfo.mapping.janCol],
                    ["レセ電コード", masterLoadInfo.mapping.receiptCol],
                    ["薬価基準コード", masterLoadInfo.mapping.yakkaCol],
                  ].map(([label, col]) => (
                    <span key={label} style={{
                      padding: "4px 12px", borderRadius: 6, fontSize: 12,
                      background: col != null ? C.successLight : "#f1f5f9",
                      color: col != null ? C.success : C.textMuted,
                      border: `1px solid ${col != null ? C.successBorder : C.border}`,
                    }}>
                      {label}: {col != null ? `列${col + 1} ✓` : "未検出"}
                    </span>
                  ))}
                </div>
              </div>
            )}

            {/* GS-1パーサーテスト */}
            <div style={{ ...cardStyle, padding: 20, marginBottom: 20 }}>
              <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 10 }}>🔍 GS-1バーコードテスト</div>
              <p style={{ fontSize: 12, color: C.textSub, marginBottom: 10 }}>
                バーコードデータを貼り付けてパース結果を確認できます。
              </p>
              <GS1Tester drugMaster={drugMaster} />
            </div>

            {/* マスター一覧（先頭20件） */}
            {drugMaster.length > 0 && (
              <div style={{ ...cardStyle, padding: 20 }}>
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 10 }}>
                  登録薬品一覧（先頭20件 / 全{drugMaster.length}件）
                </div>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr style={{ background: "#f8fafc" }}>
                        {["薬品名", "HOT9", "YJコード", "JANコード", "GTIN-14"].map((h) => (
                          <th key={h} style={{ padding: "8px 10px", textAlign: "left", borderBottom: `1px solid ${C.border}`, color: C.textSub, fontWeight: 600 }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {drugMaster.slice(0, 20).map((d, i) => (
                        <tr key={i} style={{ borderBottom: `1px solid ${C.border}` }}>
                          <td style={{ padding: "8px 10px", fontWeight: 500 }}>{d.name}</td>
                          <td style={{ padding: "8px 10px", fontFamily: "monospace", color: C.textSub }}>{d.hot9}</td>
                          <td style={{ padding: "8px 10px", fontFamily: "monospace", color: C.textSub }}>{d.yjCode}</td>
                          <td style={{ padding: "8px 10px", fontFamily: "monospace", color: C.textSub }}>{d.janCode}</td>
                          <td style={{ padding: "8px 10px", fontFamily: "monospace", color: C.primary, fontSize: 11 }}>{d.gtin14}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ════════════════ 調剤ページ ════════════════ */}
        {page === PAGES.DISPENSING && (
          <div>
            {/* マスター未読込の警告 */}
            {drugMaster.length === 0 && (
              <div style={{
                ...cardStyle, padding: "14px 20px", marginBottom: 16,
                background: C.warningLight, borderColor: "#fbbf24",
              }}>
                <span style={{ fontSize: 13, color: "#92400e" }}>
                  ⚠ 薬品マスター未読込 — デモモードで動作中（YJコード直接入力で照合可）。
                  <button onClick={() => setPage(PAGES.MASTER)} style={{ background: "none", border: "none", color: C.primary, cursor: "pointer", fontWeight: 600, textDecoration: "underline", marginLeft: 8 }}>マスター管理へ →</button>
                </span>
              </div>
            )}

            {/* NSIPS処方データ読込UI */}
            {step === STEPS.SELECT_PATIENT && (
              <div style={{ ...cardStyle, padding: "18px 20px", marginBottom: 16 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 10 }}>📋 処方データ取込</div>

                {/* サーバー接続 */}
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
                  <input
                    value={serverUrl}
                    onChange={(e) => setServerUrl(e.target.value)}
                    placeholder="http://localhost:3456"
                    style={{ padding: "7px 12px", fontSize: 13, border: `1px solid ${C.border}`, borderRadius: 8, width: 260, outline: "none", fontFamily: "monospace" }}
                  />
                  <button onClick={() => connectToServer(serverUrl)} style={{
                    padding: "7px 16px", fontSize: 13, fontWeight: 600, borderRadius: 8, cursor: "pointer", border: "none",
                    background: serverStatus === "connected" ? C.successLight : C.primary,
                    color: serverStatus === "connected" ? C.success : "#fff",
                  }}>
                    {serverStatus === "connecting" ? "接続中..." : serverStatus === "connected" ? "✅ 接続済" : "🔌 サーバー接続"}
                  </button>
                  {serverStatus === "error" && <span style={{ fontSize: 12, color: C.danger }}>❌ 接続失敗 — サーバーが起動しているか確認してください</span>}
                </div>

                {/* サーバー接続時: ファイル一覧 */}
                {serverStatus === "connected" && serverFiles.length > 0 && (
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 12, color: C.textSub, marginBottom: 6 }}>NSIPSフォルダ内のファイル（クリックで読込）:</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {serverFiles.map((f) => (
                        <button key={f.name} onClick={() => loadServerFile(f.name)} style={{
                          padding: "6px 14px", fontSize: 12, borderRadius: 8, cursor: "pointer",
                          border: `1px solid ${selectedServerFile === f.name ? C.primary : C.border}`,
                          background: selectedServerFile === f.name ? C.primaryLight : C.bg,
                          color: selectedServerFile === f.name ? C.primary : C.text,
                          fontWeight: selectedServerFile === f.name ? 600 : 400,
                        }}>
                          📄 {f.name}
                          <span style={{ fontSize: 10, color: C.textMuted, marginLeft: 6 }}>
                            {(f.size / 1024).toFixed(1)}KB
                          </span>
                        </button>
                      ))}
                    </div>
                  </div>
                )}
                {serverStatus === "connected" && serverFiles.length === 0 && (
                  <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 10 }}>
                    NSIPSフォルダにCSVファイルがありません。レセコンで処方入力するとファイルが自動検出されます。
                  </div>
                )}

                {/* 区切り線 */}
                <div style={{ borderTop: `1px solid ${C.border}`, margin: "10px 0", paddingTop: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
                    <div style={{ fontSize: 12, color: C.textSub }}>
                      {nsipsLoadInfo
                        ? <span style={{ color: C.success, fontWeight: 600 }}>✅ {nsipsLoadInfo.filename} — {nsipsLoadInfo.patientCount}名 {nsipsLoadInfo.totalRx}剤</span>
                        : "または手動でCSVファイルをアップロード"
                      }
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <label style={{
                        display: "inline-flex", alignItems: "center", gap: 6,
                        background: C.bg, color: C.textSub, padding: "6px 14px",
                        borderRadius: 8, cursor: "pointer", fontSize: 12, border: `1px solid ${C.border}`,
                      }}>
                        📂 手動アップロード
                        <input type="file" accept=".csv,.tsv,.txt" onChange={handleNSIPSFile} style={{ display: "none" }} />
                      </label>
                      {nsipsPatients.length > 0 && (
                        <button onClick={() => { setNsipsPatients([]); setNsipsLoadInfo(null); setSelectedServerFile(null); }} style={{
                          background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8,
                          color: C.textSub, padding: "6px 14px", cursor: "pointer", fontSize: 12,
                        }}>モックに戻す</button>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* STEP 0: 患者選択 */}
            {step === STEPS.SELECT_PATIENT && (
              <div>
                {/* 保留中セッション */}
                {pendingSessions.length > 0 && (
                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: "#92400e", marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
                      ⏸ 保留中（{pendingSessions.length}件）
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {pendingSessions.map((s) => (
                        <button key={s.id} onClick={() => resumeSession(s)} style={{
                          ...cardStyle, padding: "14px 20px", cursor: "pointer", textAlign: "left", color: C.text,
                          borderColor: "#fbbf24", background: C.warningLight,
                        }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <div>
                              <div style={{ fontSize: 16, fontWeight: 700 }}>
                                ⏸ {s.patient.name}
                                <span style={{ fontSize: 13, color: C.textMuted, fontWeight: 400, marginLeft: 8 }}>{s.patient.kana}</span>
                              </div>
                              <div style={{ fontSize: 13, color: "#92400e", marginTop: 3 }}>
                                {s.confirmedDrugs.length}/{s.totalPrescriptions}剤 秤量済み — タップで再開
                              </div>
                            </div>
                            <div style={{ background: "#fef3c7", borderRadius: 20, padding: "5px 14px", fontSize: 13, color: "#92400e", fontWeight: 600 }}>
                              残り{s.totalPrescriptions - s.confirmedDrugs.length}剤
                            </div>
                          </div>
                          <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>
                            済: {s.confirmedDrugs.map(d => d.drugName).join("、")}
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                <div style={{ textAlign: "center", margin: "32px 0 24px" }}>
                  <div style={{ fontSize: 40, marginBottom: 8 }}>📂</div>
                  <div style={{ fontSize: 16, fontWeight: 600 }}>患者を選択してください</div>
                  <div style={{ fontSize: 13, color: C.textMuted }}>
                    {nsipsPatients.length > 0 ? `NSIPS読込データ（${nsipsLoadInfo?.filename}）` : "NSIPSデータから取得（モックデータ）"}
                  </div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {patients.map((p) => (
                    <button key={p.id} onClick={() => selectPatient(p)} style={{
                      ...cardStyle, padding: "16px 22px", cursor: "pointer", textAlign: "left", color: C.text, transition: "all 0.15s",
                    }} onMouseEnter={(e) => { e.currentTarget.style.borderColor = C.primary; e.currentTarget.style.boxShadow = "0 2px 12px rgba(59,130,246,0.1)"; }}
                       onMouseLeave={(e) => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.boxShadow = "0 1px 4px rgba(0,0,0,0.04)"; }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div>
                          <div style={{ fontSize: 17, fontWeight: 700 }}>{p.name} <span style={{ fontSize: 13, color: C.textMuted, fontWeight: 400 }}>{p.kana}</span></div>
                          <div style={{ fontSize: 13, color: C.textSub, marginTop: 3 }}>{p.age}歳 {p.gender} ／ {p.prescriptionDate} ／ {p.doctor} 医師</div>
                        </div>
                        <div style={{ background: C.primaryLight, borderRadius: 20, padding: "5px 14px", fontSize: 13, color: C.primary, fontWeight: 600 }}>{p.prescriptions.length}剤</div>
                      </div>
                      <div style={{ fontSize: 12, color: C.textMuted, marginTop: 6 }}>
                        {p.prescriptions.map((rx) => rx.drugName).join("、")}
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* 患者情報バー + 進捗 + 処方一覧 */}
            {selectedPatient && step !== STEPS.SELECT_PATIENT && (
              <>
                <div style={{ ...cardStyle, padding: "12px 18px", marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 34, height: 34, borderRadius: 9, background: C.primaryLight, color: C.primary, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, fontWeight: 700 }}>{selectedPatient.name[0]}</div>
                    <span style={{ fontSize: 15, fontWeight: 700 }}>{selectedPatient.name}</span>
                    <span style={{ color: C.textMuted, fontSize: 13 }}>{selectedPatient.age}歳 {selectedPatient.gender}</span>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    {confirmedDrugs.length > 0 && (
                      <button onClick={savePendingSession} style={{ background: C.warningLight, border: "1px solid #fbbf24", borderRadius: 8, color: "#92400e", padding: "6px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>⏸ 一時保存</button>
                    )}
                    <button onClick={resetAll} style={{ background: C.dangerLight, border: "1px solid #fca5a5", borderRadius: 8, color: C.danger, padding: "6px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600 }}>✕ 中断</button>
                  </div>
                </div>

                <div style={{ background: "#e2e8f0", borderRadius: 8, height: 7, marginBottom: 14, overflow: "hidden" }}>
                  <div style={{ height: "100%", borderRadius: 8, background: step === STEPS.COMPLETE ? `linear-gradient(90deg,${C.success},#34d399)` : `linear-gradient(90deg,${C.primary},#60a5fa)`, width: `${progressPercent}%`, transition: "width 0.5s" }} />
                </div>

                {/* 処方一覧（Rpグループ表示） */}
                {getRpGroups(selectedPatient.prescriptions).map((rp) => (
                  <div key={rp.rpNo} style={{ ...cardStyle, padding: "12px 16px", marginBottom: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: C.primary }}>
                        Rp.{rp.rpNo} <span style={{ fontWeight: 400, color: C.textSub, marginLeft: 6 }}>{rp.usage}</span>
                        <span style={{ fontWeight: 400, color: C.textMuted, marginLeft: 6 }}>({rp.days}日分)</span>
                      </div>
                      {step === STEPS.SCAN_DRUG && (
                        <button onClick={() => { openAddDrug(); setAddDrugRpNo(rp.rpNo); }} style={{
                          background: C.bg, border: `1px solid ${C.border}`, borderRadius: 6,
                          color: C.primary, padding: "3px 10px", cursor: "pointer", fontSize: 11, fontWeight: 600,
                        }}>＋ 薬剤追加</button>
                      )}
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: `repeat(${Math.min(rp.drugs.length, 4)},1fr)`, gap: 6 }}>
                      {rp.drugs.map((rx, i) => {
                        const globalIdx = selectedPatient.prescriptions.indexOf(rx);
                        const done = confirmedDrugs.some(d => d.drugName === rx.drugName);
                        const cur = globalIdx === currentDrugIndex && step === STEPS.WEIGHING;
                        return (
                          <div key={i} style={{
                            background: done ? C.successLight : cur ? C.primaryLight : C.card,
                            border: `2px solid ${done ? C.successBorder : cur ? C.primary : C.border}`,
                            borderRadius: 10, padding: "8px 10px", textAlign: "center", position: "relative",
                          }}>
                            {done && <div style={{ position: "absolute", top: 4, right: 6, fontSize: 13, color: C.success }}>✓</div>}
                            {rx.isAdded && <div style={{ position: "absolute", top: 4, left: 6, fontSize: 10, color: C.warning }}>追加</div>}
                            <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 2 }}>{rx.drugName}</div>
                            <div style={{ fontSize: 17, fontWeight: 700, color: cur ? C.primary : done ? C.success : C.textSub }}>{rx.totalG.toFixed(3)}g</div>
                            <div style={{ fontSize: 10, color: C.textMuted }}>{rx.dosage}{rx.unit}/日</div>
                            {done && confirmedDrugs.find(d => d.drugName === rx.drugName) && (
                              <div style={{ fontSize: 10, color: confirmedDrugs.find(d => d.drugName === rx.drugName)?.forcedConfirm ? "#f97316" : C.success, marginTop: 2, fontWeight: 600 }}>
                                {confirmedDrugs.find(d => d.drugName === rx.drugName)?.forcedConfirm ? "⚠ " : ""}
                                実測: {confirmedDrugs.find(d => d.drugName === rx.drugName).measuredG.toFixed(3)}g
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}

                {/* 薬剤追加ダイアログ */}
                {showAddDrug && (
                  <div style={{ ...cardStyle, padding: 20, marginBottom: 10, background: C.warningLight, borderColor: "#fbbf24" }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: "#92400e", marginBottom: 12 }}>
                      ＋ Rp.{addDrugRpNo} に薬剤を追加
                      <span style={{ fontSize: 12, fontWeight: 400, color: C.textSub, marginLeft: 8 }}>
                        ({getRpGroups(selectedPatient.prescriptions).find(r => r.rpNo === addDrugRpNo)?.days || 0}日分)
                      </span>
                    </div>

                    {/* バーコード読取 */}
                    <div style={{ marginBottom: 12 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: C.text, marginBottom: 4 }}>① 容器のバーコードをスキャン</div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <input value={addDrugGtin} onChange={(e) => setAddDrugGtin(e.target.value)}
                          placeholder="バーコードをスキャン"
                          style={{ flex: 1, padding: "8px 12px", fontSize: 14, border: `1px solid ${C.border}`, borderRadius: 8, outline: "none" }}
                          onKeyDown={(e) => e.key === "Enter" && scanAddDrug()}
                          autoFocus
                        />
                        <button onClick={scanAddDrug} style={{ padding: "8px 16px", fontSize: 13, background: C.primary, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 600 }}>読取</button>
                      </div>
                      {addDrugInfo && (
                        <div style={{ fontSize: 11, color: C.textSub, marginTop: 4 }}>
                          GTIN: <span style={{ fontFamily: "monospace" }}>{addDrugInfo.gtin14}</span>
                          {gtinMap[addDrugInfo.gtin14] && <span style={{ color: C.success, marginLeft: 8 }}>✅ 登録済: {gtinMap[addDrugInfo.gtin14].drugName}</span>}
                        </div>
                      )}
                    </div>

                    {/* 薬品名 */}
                    <div style={{ marginBottom: 12 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: C.text, marginBottom: 4 }}>② 薬品名</div>
                      <input value={addDrugName} onChange={(e) => setAddDrugName(e.target.value)}
                        placeholder="薬品名を入力（例: 乳糖）"
                        style={{ width: "100%", padding: "8px 12px", fontSize: 14, border: `1px solid ${C.border}`, borderRadius: 8, outline: "none", boxSizing: "border-box" }}
                      />
                    </div>

                    {/* 1日量 + 単位 */}
                    <div style={{ marginBottom: 12 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: C.text, marginBottom: 4 }}>③ 1日量</div>
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <input value={addDrugDosage} onChange={(e) => setAddDrugDosage(e.target.value)}
                          placeholder="0.300" type="number" step="0.001"
                          style={{ width: 140, padding: "8px 12px", fontSize: 16, border: `1px solid ${C.border}`, borderRadius: 8, outline: "none", textAlign: "right" }}
                        />
                        <select value={addDrugUnit} onChange={(e) => setAddDrugUnit(e.target.value)}
                          style={{ padding: "8px 12px", fontSize: 14, border: `1px solid ${C.border}`, borderRadius: 8, outline: "none" }}>
                          <option value="g">g</option>
                          <option value="mg">mg</option>
                        </select>
                        <span style={{ fontSize: 13, color: C.textSub }}>
                          × {getRpGroups(selectedPatient.prescriptions).find(r => r.rpNo === addDrugRpNo)?.days || 0}日
                          = <b style={{ color: C.primary }}>
                            {addDrugDosage ? (
                              addDrugUnit === "mg"
                                ? ((parseFloat(addDrugDosage) || 0) * (getRpGroups(selectedPatient.prescriptions).find(r => r.rpNo === addDrugRpNo)?.days || 0) / 1000).toFixed(3) + "g"
                                : ((parseFloat(addDrugDosage) || 0) * (getRpGroups(selectedPatient.prescriptions).find(r => r.rpNo === addDrugRpNo)?.days || 0)).toFixed(3) + "g"
                            ) : "—"}
                          </b>
                        </span>
                      </div>
                    </div>

                    {/* ボタン */}
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={confirmAddDrug} disabled={!addDrugName || !addDrugDosage} style={{
                        padding: "10px 24px", fontSize: 14, fontWeight: 600, borderRadius: 8, cursor: "pointer", border: "none",
                        background: addDrugName && addDrugDosage ? C.primary : "#cbd5e1", color: "#fff",
                      }}>追加して秤量へ</button>
                      <button onClick={() => setShowAddDrug(false)} style={{
                        padding: "10px 20px", fontSize: 13, background: C.bg, border: `1px solid ${C.border}`, borderRadius: 8, cursor: "pointer", color: C.textSub,
                      }}>キャンセル</button>
                    </div>
                  </div>
                )}
              </>
            )}

            {/* STEP 1: バーコード読取（自由順） */}
            {step === STEPS.SCAN_DRUG && selectedPatient && (
              <div style={{ ...cardStyle, padding: 28, textAlign: "center" }}>
                <div style={{ fontSize: 44, marginBottom: 8 }}>📷</div>
                <div style={{ fontSize: 19, fontWeight: 700, marginBottom: 10 }}>容器のバーコードを読み取ってください</div>
                <div style={{ fontSize: 13, color: C.textSub, marginBottom: 14 }}>
                  残り {selectedPatient.prescriptions.length - confirmedDrugs.length}剤 — どの薬からでもOK
                </div>

                {/* 未秤量の薬一覧 */}
                <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: 8, marginBottom: 16 }}>
                  {selectedPatient.prescriptions.map((rx, i) => {
                    const done = confirmedDrugs.some(d => d.drugName === rx.drugName);
                    return (
                      <div key={i} style={{
                        padding: "6px 14px", borderRadius: 8, fontSize: 13,
                        background: done ? C.successLight : C.primaryLight,
                        color: done ? C.success : C.primary,
                        border: `1px solid ${done ? C.successBorder : "rgba(59,130,246,0.2)"}`,
                        fontWeight: 600, opacity: done ? 0.6 : 1,
                      }}>
                        {done ? "✓ " : ""}{rx.drugName}
                      </div>
                    );
                  })}
                </div>

                <div style={{ maxWidth: 480, margin: "0 auto" }}>
                  <input ref={barcodeRef} autoFocus value={barcodeInput}
                    onChange={(e) => { setBarcodeInput(e.target.value); setErrorMsg(""); }}
                    placeholder="GS-1バーコードをスキャン"
                    style={{ width: "100%", padding: "13px 18px", fontSize: 17, background: C.bg, border: `2px solid ${C.border}`, borderRadius: 10, color: C.text, textAlign: "center", outline: "none", boxSizing: "border-box" }}
                    onFocus={(e) => e.target.style.borderColor = C.primary}
                    onBlur={(e) => e.target.style.borderColor = C.border}
                  />
                  <button onClick={handleBarcodeScan} style={{ marginTop: 10, padding: "10px 34px", fontSize: 14, background: C.primary, border: "none", borderRadius: 10, color: "#fff", cursor: "pointer", fontWeight: 600 }}>照合する</button>
                </div>

                {lastScanResult && !showGtinRegister && (
                  <div style={{ marginTop: 16, ...cardStyle, padding: 14, textAlign: "left", fontSize: 12, color: C.textSub }}>
                    <div style={{ fontWeight: 600, marginBottom: 6, color: C.text }}>GS-1パース結果:</div>
                    <div>GTIN-14: <span style={{ fontFamily: "monospace", color: C.primary }}>{lastScanResult.gtin14 || "—"}</span></div>
                    {lastScanResult.expiry && <div>有効期限: {lastScanResult.expiry.formatted}</div>}
                    {lastScanResult.lot && <div>ロット: {lastScanResult.lot}</div>}
                    {lastScanResult.errors?.length > 0 && <div style={{ color: C.warning }}>{lastScanResult.errors.join(", ")}</div>}
                  </div>
                )}

                {/* ── 初回GTIN登録ダイアログ ── */}
                {showGtinRegister && pendingGtin && (
                  <div style={{
                    marginTop: 16, background: C.warningLight, border: `2px solid #fbbf24`,
                    borderRadius: 14, padding: 20, textAlign: "left",
                  }}>
                    <div style={{ fontSize: 16, fontWeight: 700, color: "#92400e", marginBottom: 4 }}>
                      📋 初回登録：この容器はどの薬ですか？
                    </div>
                    <div style={{ fontSize: 12, color: "#92400e", marginBottom: 14 }}>
                      GTIN: <span style={{ fontFamily: "monospace" }}>{pendingGtin}</span> — まだ登録されていません。下から選んでください。
                    </div>

                    {selectedPatient && (
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 8 }}>
                          {selectedPatient.name}さんの未秤量薬:
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                          {selectedPatient.prescriptions.map((rx, i) => {
                            const done = confirmedDrugs.some(d => d.drugName === rx.drugName);
                            if (done) return null;
                            return (
                              <button key={i} onClick={() => registerGtinWithDrug(rx, i)} style={{
                                padding: "12px 16px", borderRadius: 10, cursor: "pointer",
                                border: `2px solid ${C.border}`,
                                background: "#fff",
                                textAlign: "left", color: C.text, fontSize: 14,
                              }}>
                                <div style={{ fontWeight: 600 }}>{rx.drugName}</div>
                                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>
                                  {rx.receiptCode || rx.code || rx.yjCode || ""} / {rx.totalG.toFixed(3)}g
                                </div>
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    <button onClick={() => { setShowGtinRegister(false); setPendingGtin(null); setBarcodeInput(""); }} style={{
                      marginTop: 12, padding: "8px 20px", fontSize: 13, background: C.bg,
                      border: `1px solid ${C.border}`, borderRadius: 8, cursor: "pointer", color: C.textSub,
                    }}>キャンセル</button>
                  </div>
                )}

                {errorMsg && (
                  <div style={{ marginTop: 16, background: C.dangerLight, border: `2px solid ${C.danger}`, borderRadius: 12, padding: 14, color: C.danger, fontSize: 14, fontWeight: 600, whiteSpace: "pre-line" }}>⛔ {errorMsg}</div>
                )}
              </div>
            )}

            {/* STEP 2: 秤量 */}
            {step === STEPS.WEIGHING && currentDrug && (
              <div style={{ ...cardStyle, padding: 28, textAlign: "center", borderColor: isWithinTolerance || drugConfirmed ? C.successBorder : C.border, borderWidth: 2, borderStyle: "solid" }}>
                <div style={{ fontSize: 14, color: C.textSub, marginBottom: 8 }}>秤量中: <span style={{ color: C.primary, fontWeight: 700 }}>{currentDrug.drugName}</span></div>
                <div style={{ background: C.bg, borderRadius: 16, padding: "24px 36px", margin: "10px auto", maxWidth: 480, border: `3px solid ${drugConfirmed ? C.successBorder : isWithinTolerance ? C.successBorder : scaleValue > 0 ? "#fbbf24" : C.border}`, transition: "border-color 0.3s" }}>

                  {/* 天秤接続ボタン */}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <div style={{ fontSize: 11, color: C.textMuted, letterSpacing: 2 }}>
                      TAKAZO LB-600S2
                      {scaleStatus === "connected" && <span style={{ color: C.success, marginLeft: 6 }}>● 接続中</span>}
                    </div>
                    <button onClick={handleConnectScale} style={{
                      padding: "4px 12px", fontSize: 11, borderRadius: 6, cursor: "pointer", fontWeight: 600,
                      background: scaleStatus === "connected" ? C.dangerLight : C.primaryLight,
                      color: scaleStatus === "connected" ? C.danger : C.primary,
                      border: `1px solid ${scaleStatus === "connected" ? "#fca5a5" : "rgba(59,130,246,0.2)"}`,
                    }}>
                      {scaleStatus === "connected" ? "切断" : scaleStatus === "connecting" ? "接続中..." : "⚡ 天秤接続"}
                    </button>
                  </div>

                  {/* 秤量値表示 */}
                  <div style={{ fontSize: 52, fontWeight: 700, fontFamily: "'Courier New',monospace", color: drugConfirmed || isWithinTolerance ? C.success : C.text }}>
                    {scaleValue.toFixed(3)}<span style={{ fontSize: 22, color: C.textMuted }}> g</span>
                  </div>

                  {/* 天秤接続時: raw data表示 */}
                  {scaleStatus === "connected" && scaleRawData && (
                    <div style={{ fontSize: 10, color: C.textMuted, fontFamily: "monospace", marginTop: 4 }}>
                      RAW: {scaleRawData}
                    </div>
                  )}

                  {/* 天秤未接続時: 手入力 */}
                  {scaleStatus !== "connected" && (
                    <div style={{ marginTop: 14, padding: 12, background: C.warningLight, borderRadius: 8, border: "1px dashed #fbbf24" }}>
                      <div style={{ fontSize: 11, color: C.warning, marginBottom: 6, fontWeight: 600 }}>⚡ 手入力モード（天秤未接続）</div>
                      <input ref={scaleRef} type="number" step="0.001" value={scaleValue || ""} onChange={handleScaleInput}
                        placeholder="秤量値(g)" style={{ width: "100%", padding: 9, fontSize: 19, background: "#fff", border: `1px solid ${C.border}`, borderRadius: 7, color: C.text, textAlign: "center", outline: "none", boxSizing: "border-box" }}
                      />
                      <div style={{ fontSize: 11, color: C.textSub, marginTop: 5 }}>許容範囲内で「0」入力 → 確定</div>
                    </div>
                  )}

                  {/* 接続エラー表示 */}
                  {scaleStatus === "error" && (
                    <div style={{ marginTop: 8, fontSize: 12, color: C.danger }}>{scaleStatusMsg}</div>
                  )}
                </div>

                <div style={{ display: "flex", justifyContent: "center", gap: 28, marginTop: 18 }}>
                  {[
                    ["目標値", `${currentDrug.totalG.toFixed(3)}g`, C.primary],
                    ["差分", scaleValue > 0 ? `${(scaleValue - currentDrug.totalG >= 0 ? "+" : "")}${(scaleValue - currentDrug.totalG).toFixed(3)}g` : "—", isWithinTolerance ? C.success : C.warning],
                    ["誤差率", scaleValue > 0 ? `${(Math.abs(scaleValue - currentDrug.totalG) / currentDrug.totalG * 100).toFixed(1)}%` : "—", isWithinTolerance ? C.success : C.warning],
                  ].map(([label, val, col]) => (
                    <div key={label} style={{ background: C.bg, borderRadius: 10, padding: "10px 18px", minWidth: 100 }}>
                      <div style={{ color: C.textMuted, fontSize: 11, fontWeight: 600, marginBottom: 3 }}>{label}</div>
                      <div style={{ fontSize: 20, fontWeight: 700, color: col }}>{val}</div>
                    </div>
                  ))}
                </div>

                <div style={{
                  marginTop: 18, padding: "12px 22px", borderRadius: 10, fontSize: 14, fontWeight: 700,
                  background: drugConfirmed || isWithinTolerance ? C.successLight : C.bg,
                  color: drugConfirmed || isWithinTolerance ? C.success : C.textSub,
                  border: `1px solid ${drugConfirmed || isWithinTolerance ? C.successBorder : C.border}`,
                }}>
                  {drugConfirmed ? "✅ 確定！次の薬剤へ..." : isWithinTolerance ? "🔔 許容範囲内！0を入力して確定" : scaleValue > 0 ? "⏳ 秤量中..." : "⚖️ 薬剤を秤に載せてください"}
                </div>

                {/* 手動確定ボタン */}
                {!drugConfirmed && scaleValue > 0 && (
                  <button onClick={() => {
                    const forced = !isWithinTolerance;
                    setDrugConfirmed(true);
                    playSound("confirm");
                    setConfirmedDrugs((prev) => [...prev, {
                      ...currentDrug,
                      measuredG: scaleValue,
                      timestamp: new Date().toISOString(),
                      forcedConfirm: forced,
                      errorPercent: currentDrug.totalG > 0 ? Math.abs(scaleValue - currentDrug.totalG) / currentDrug.totalG * 100 : 0,
                    }]);
                    setTimeout(() => {
                      const newCount = confirmedDrugs.length + 1;
                      if (newCount < selectedPatient.prescriptions.length) {
                        setScaleValue(0); setPrevScaleValue(0); setDrugConfirmed(false);
                        setBarcodeInput(""); setLastScanResult(null); setStep(STEPS.SCAN_DRUG);
                        setTimeout(() => barcodeRef.current?.focus(), 100);
                      } else {
                        setStep(STEPS.COMPLETE);
                      }
                    }, 1200);
                  }} style={{
                    marginTop: 12, padding: "10px 28px", fontSize: 14, fontWeight: 600,
                    borderRadius: 10, cursor: "pointer",
                    background: isWithinTolerance ? C.success : "#f97316",
                    color: "#fff", border: "none",
                    boxShadow: isWithinTolerance ? "0 2px 8px rgba(16,185,129,0.2)" : "0 2px 8px rgba(249,115,22,0.2)",
                  }}>
                    {isWithinTolerance ? "✅ 手動確定" : "⚠️ 強制確定（範囲外）"}
                  </button>
                )}
              </div>
            )}

            {/* STEP 3: 完了 */}
            {step === STEPS.COMPLETE && (
              <div style={{ ...cardStyle, padding: 36, textAlign: "center", background: `linear-gradient(135deg,${C.successLight},#fff)`, borderColor: C.successBorder, borderWidth: 2, borderStyle: "solid" }}>
                <div style={{ fontSize: 56, marginBottom: 14 }}>🎉</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: C.success, marginBottom: 6 }}>全薬剤の秤量が完了</div>
                <div style={{ fontSize: 14, color: C.textSub, marginBottom: 22 }}>{selectedPatient.name} の調剤記録</div>
                <div style={{ ...cardStyle, padding: 18, textAlign: "left", maxWidth: 500, margin: "0 auto 22px" }}>
                  {confirmedDrugs.map((d, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: i < confirmedDrugs.length - 1 ? `1px solid ${C.border}` : "none" }}>
                      <span style={{ fontSize: 14, fontWeight: 500 }}>
                        {d.drugName}
                        {d.forcedConfirm && <span style={{ fontSize: 10, color: "#f97316", marginLeft: 6, fontWeight: 700, background: "#fff7ed", padding: "2px 6px", borderRadius: 4 }}>⚠ 強制確定</span>}
                      </span>
                      <span style={{ fontSize: 14, fontWeight: 700, color: d.forcedConfirm ? "#f97316" : C.success }}>
                        {d.measuredG.toFixed(3)}g
                        <span style={{ color: C.textMuted, fontWeight: 400, fontSize: 12 }}> (目標{d.totalG.toFixed(3)}g{d.forcedConfirm ? ` 誤差${d.errorPercent?.toFixed(1)}%` : ""})</span>
                      </span>
                    </div>
                  ))}
                </div>
                <button onClick={saveRecord} style={{ padding: "13px 40px", fontSize: 15, fontWeight: 700, background: `linear-gradient(135deg,${C.success},#059669)`, border: "none", borderRadius: 12, color: "#fff", cursor: "pointer", boxShadow: "0 4px 16px rgba(16,185,129,0.25)" }}>💾 保存して終了</button>
              </div>
            )}
          </div>
        )}

        {/* ════════════════ 履歴ページ ════════════════ */}
        {page === PAGES.HISTORY && (
          <div>
            <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 16 }}>📋 調剤履歴</h2>
            {history.length === 0 ? (
              <div style={{ ...cardStyle, padding: 40, textAlign: "center", color: C.textMuted }}>まだ履歴がありません</div>
            ) : (
              history.map((r) => (
                <div key={r.id} style={{ ...cardStyle, padding: 16, marginBottom: 10 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                    <span style={{ fontWeight: 600 }}>{r.patient.name}（{r.patient.kana}）</span>
                    <span style={{ color: C.textMuted, fontSize: 12 }}>{new Date(r.completedAt).toLocaleString("ja-JP")}</span>
                  </div>
                  <div style={{ fontSize: 13, color: C.textSub }}>
                    {r.drugs.map((d, i) => <span key={i}>{d.drugName} {d.measuredG.toFixed(3)}g{i < r.drugs.length - 1 ? " / " : ""}</span>)}
                  </div>
                </div>
              ))
            )}
          </div>
        )}
      </div>

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
      `}</style>
    </div>
  );
}

// ── GS-1テスターコンポーネント ──
function GS1Tester({ drugMaster }) {
  const [input, setInput] = useState("");
  const [result, setResult] = useState(null);

  const test = () => {
    if (!input.trim()) return;
    const parsed = parseGS1Barcode(input.trim());
    const masterHit = drugMaster.find((d) => d.gtin14 === parsed.gtin14);
    const jan = gtin14ToJan(parsed.gtin14);
    setResult({ ...parsed, masterHit, jan });
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
        <input value={input} onChange={(e) => setInput(e.target.value)}
          placeholder="例: 0104987654321234172603301012345"
          style={{ flex: 1, padding: "9px 14px", fontSize: 13, border: `1px solid ${C.border}`, borderRadius: 8, outline: "none", fontFamily: "monospace" }}
          onKeyDown={(e) => e.key === "Enter" && test()}
        />
        <button onClick={test} style={{ padding: "9px 20px", fontSize: 13, background: C.primary, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 600 }}>解析</button>
      </div>
      {result && (
        <div style={{ fontSize: 12, lineHeight: 1.8, color: C.textSub }}>
          <div>GTIN-14: <b style={{ color: C.primary }}>{result.gtin14 || "—"}</b></div>
          <div>JAN(算出): <b>{result.jan || "—"}</b></div>
          {result.expiry && <div>有効期限: <b>{result.expiry.formatted}</b></div>}
          {result.lot && <div>ロット: <b>{result.lot}</b></div>}
          {result.serial && <div>シリアル: <b>{result.serial}</b></div>}
          <div>マスター照合: {result.masterHit ? <b style={{ color: C.success }}>✅ {result.masterHit.name}</b> : <span style={{ color: C.textMuted }}>該当なし</span>}</div>
          {result.errors?.length > 0 && <div style={{ color: C.warning }}>注意: {result.errors.join(", ")}</div>}
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
